name: CI

on:
  push:
    branches: [main]
    tags: ['v*'] # a pushed version tag (e.g. v1.2.0) cuts a release
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # The UI embeds uPlot, which is fetched from a CDN (gitignored). Vendor it
      # so the embedded asset set matches a real build.
      - name: Vendor UI assets
        run: make vendor-js

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # Unit tests + the in-process fleet integration suite. The tests/e2e and
      # tests/cluster suites are intentionally excluded: they require a live
      # multi-host cluster with PKI under /etc/litevirt and root privileges.
      - name: Test
        run: go test ./internal/... ./cmd/... ./tests/fleet/

  # Schema-versioning guard: a CREATE TABLE / ALTER / index added to
  # internal/corrosion/schema.go must come with a CurrentSchemaVersion bump, or
  # the mixed-version replication skew check can't tell a peer is out of date.
  # The History↔version lockstep and the claim-vs-code (docs↔CLI/metrics)
  # triangulation are enforced by `go test` above; this job adds the part that
  # needs the diff — detecting array growth between the base and head revisions.
  schema-guard:
    name: Schema version guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need base history to detect schema growth

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Schema growth requires a version bump
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: ./scripts/ci/check-schema-bump.sh

  release:
    name: Release
    needs: test
    # Only on a pushed version tag (v*). The tag name is the release version,
    # so cut a release with e.g. `git tag v1.2.0 && git push origin v1.2.0`.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ github.ref_name }} # the tag, e.g. v1.2.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vendor UI assets
        run: make vendor-js

      - name: Build release binaries
        env:
          COMMIT: ${{ github.sha }}
        run: |
          echo "Release version: ${VERSION}"
          mkdir -p dist
          for arch in amd64 arm64; do
            echo "building linux/${arch}..."
            CGO_ENABLED=0 GOOS=linux GOARCH="${arch}" go build \
              -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT}" \
              -o dist/litevirt ./cmd/litevirt
            ( cd dist && ln -sf litevirt lv \
              && tar -czf "litevirt-${VERSION}-linux-${arch}.tar.gz" litevirt lv \
              && rm -f litevirt lv )
          done
          ( cd dist && sha256sum *.tar.gz > "litevirt-${VERSION}-checksums.txt" )
          ls -l dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --generate-notes \
            dist/*.tar.gz dist/*checksums.txt
